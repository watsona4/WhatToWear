<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
    <meta name="description" content="">
    <meta name="author" content="">

    <title>What to Wear</title>

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">

    <!-- Optional theme -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous">

    <style>
      .center {
          text-align: center;
          vertical-align: middle;
      }
      h2.center {
          font-weight: bold;
      }
      .middle {
          display: inline-block;
          vertical-align: middle;
      }
      h2.middle {
          font-weight: bold;
      }
      img {
          display: block;
          margin: auto;
          vertical-align: middle;
      }
    </style>

  </head>

  <body>

    <script type="text/javascript">
      window.onload = function (event) {
          init();
      };
    </script>

    <div class="container">

      <ul id="location" class="nav nav-tabs">
	<li class="active"><a data-toggle="tab" href="#">Greenwich</a></li>
	<li><a data-toggle="tab" href="#">Schenectady</a></li>
	<li><a data-toggle="tab" href="#">Houston</a></li>
      </ul>

      <h4>Selection the location above and the activity below</h4>

      <div class="row">
	<div class="col-xs-2 col-sm-2 col-md-2 col-lg-2 ">
	    <img id="image" class="img-responsive" src="">
	</div>
	<div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
	    <h2 id="temp" class="center"></h2>
	</div>
	<div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
	  <h4 id="feels"></h4>
	  <h4 id="hilo"></h4>
	  <h4 id="fcst"></h4>
	</div>
      </div>

      <div class="row">
	<div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
	  <h2 class="middle">Rec. clothing:</h2>
	</div>
	<div class="col-xs-8 col-sm-8 col-md-8 col-lg-8"
	     style="margin-top: 3px;">
	  <h3 id="wear" class="middle"></h3>
	</div>
      </div>

      <div class="row">
	<div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
	  <h2 class="middle">Sugg. attire:</h2>
	</div>
	<div class="col-xs-8 col-sm-8 col-md-8 col-lg-8"
	     style="margin-top: 3px;">
	  <h3 id="attire" class="middle"></h3>
	  <button id="attireButton" class="btn btn-default middle"
		  style="margin-left: 5px;">
	    Get Suggestion
	  </button>
	</div>
      </div>

      <div class="row">
	<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
	  <ul id="activity" class="nav nav-pills">
	    <li class="active"><a data-toggle="tab" href="#">Work</a></li>
	    <li><a data-toggle="tab" href="#">Home</a></li>
	  </ul>
	</div>
      </div>

    </div><!-- /.container -->


    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>

    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>

    <!-- Clothing Script -->
    <script src="js/clothing.js" type="text/javascript"></script>
